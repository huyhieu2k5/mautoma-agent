name: Bug Report
description: Report something that isn't working as expected
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. Please fill in the sections below.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug — what command, what input, what output.
      placeholder: |
        Running `npm start -- "lên kế hoạch"` returned a stack trace mentioning `disputeSessionId`.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen instead?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal reproduction steps.
      placeholder: |
        1. Install: `npm install`
        2. Run: `npm start`
        3. Type: ...
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: Output of `npm ls mautoma-agent` or the version you installed.
      placeholder: "1.0.1"
    validations:
      required: true

  - type: input
    id: node
    attributes:
      label: Node version
      description: Output of `node -v`.
      placeholder: "v20.11.1"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Linux
        - Windows
        - Other
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs / stack trace
      description: Paste the full error output, including the stack trace.
      render: shell