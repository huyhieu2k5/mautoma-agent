name: Documentation Improvement
description: Improve docs, examples, or comments
title: "[Docs]: "
labels: ["docs"]
body:
  - type: textarea
    id: location
    attributes:
      label: File(s) affected
      description: Which README, SKILL.md, or comment block needs improvement?
    validations:
      required: true
  - type: textarea
    id: issue
    attributes:
      label: What's missing or unclear?
    validations:
      required: true
  - type: textarea
    id: suggestion
    attributes:
      label: Suggested improvement