name: Security Audit

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    # Run weekly on Monday morning
    - cron: '0 8 * * 1'

permissions:
  contents: read

jobs:
  audit:
    name: npm audit & SBOM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci

      - name: npm audit (fail on high/critical)
        run: npm audit --audit-level=high
        continue-on-error: false

      - name: Generate SBOM (SPDX)
        uses: anchore/sbom-action@v0
        with:
          format: spdx-json
          artifact-name: mautoma-agent.spdx.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: mautoma-agent.spdx.json
          retention-days: 90