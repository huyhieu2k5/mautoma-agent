version: 2

updates:
  - package-ecosystem: npm
    directory: '/'
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
    open-pull-requests-limit: 10
    versioning-strategy: increase
    groups:
      typescript-eslint:
        patterns:
          - '@typescript-eslint/*'
      vite-vitest:
        patterns:
          - 'vitest'
          - '@vitest/*'
      dev-deps:
        patterns:
          - '*'
    labels:
      - 'deps'
    commit-message:
      prefix: 'chore(deps)'
    ignore:
      - dependency-name: 'typescript'
        versions: ['5.x']
      - dependency-name: 'eslint'
        versions: ['9.x']  # ESLint 9 has flat config breaking change — wait for migration

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: weekly
    commit-message:
      prefix: 'ci(deps)'
    labels:
      - 'ci'